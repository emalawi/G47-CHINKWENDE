<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G47 CHINKWENDE AI - Emalawi19</title>
<style>
    /* General styling */
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #ACB6E5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    .chat-container {
        background-color: rgba(255,255,255,0.95);
        width: 400px;
        max-width: 90%;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 24px;
        color: #333;
        animation: fadeIn 2s ease-in-out;
    }

    #chat-box {
        flex: 1;
        border: 1px solid #ddd;
        padding: 10px;
        margin-bottom: 10px;
        overflow-y: auto;
        border-radius: 10px;
        background-color: #f9f9f9;
    }

    .user-msg { text-align: right; color: #1E90FF; margin: 5px 0; }
    .ai-msg { text-align: left; color: #228B22; margin: 5px 0; }

    input[type="text"] {
        width: 70%;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px;
        border-radius: 5px;
        border: none;
        background-color: #4CAF50;
        color: white;
        cursor: pointer;
        margin-left: 5px;
    }

    /* Text animation */
    @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(-20px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
        0% { opacity: 0; }
        50% { opacity: 1; }
        100% { opacity: 0; }
    }

    .typing {
        font-style: italic;
        color: #888;
        margin-bottom: 5px;
        animation: blink 1s infinite;
    }
</style>
</head>
<body>
<div class="chat-container">
    <h1>G47 CHINKWENDE AI 🤖</h1>
    <div id="chat-box"></div>
    <div style="display:flex;">
        <input type="text" id="user-input" placeholder="Type your message here...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const userMessage = input.value.trim();
    if (!userMessage) return;

    // Show user message
    const userDiv = document.createElement("div");
    userDiv.className = "user-msg";
    userDiv.textContent = userMessage;
    chatBox.appendChild(userDiv);

    // Show typing animation
    const typingDiv = document.createElement("div");
    typingDiv.className = "typing";
    typingDiv.textContent = "G47 CHINKWENDE is typing...";
    chatBox.appendChild(typingDiv);

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("https://huggingface.co/spaces/Emalawi19/DXV/api/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ data: [userMessage] })
        });

        const data = await response.json();
        const aiMessage = data.data[0];

        // Remove typing animation
        typingDiv.remove();

        // Show AI message
        const aiDiv = document.createElement("div");
        aiDiv.className = "ai-msg";
        aiDiv.textContent = aiMessage;
        chatBox.appendChild(aiDiv);

        chatBox.scrollTop = chatBox.scrollHeight;
    } catch (err) {
        typingDiv.textContent = "Error connecting to AI. Please try again.";
        console.error(err);
    }
}
</script>
</body>
</html>
